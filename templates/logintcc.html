<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso — IMTSB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --brown:      #7c5c3e;
      --brown-dk:   #3e2510;
      --brown-lt:   #c4a882;
      --beige:      #f0e8dc;
      --beige-lt:   #faf6f1;
      --bordeaux:   #3d1010;
      --text:       #2a1a0a;
      --muted:      #8a7060;
      --ok:         #1a6b50;
      --error:      #a31c1c;
      --radius:     16px;
      --shadow:     0 8px 32px rgba(62,37,16,.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--beige);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background-image:
        radial-gradient(ellipse 70% 60% at 80% 10%, rgba(196,168,130,.22) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(124,92,62,.12) 0%, transparent 60%);
    }

    /* ── Card ──────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--beige-lt);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow), 0 1px 0 rgba(255,255,255,.8) inset;
      border: 1px solid rgba(196,168,130,.35);
    }

    /* ── Banner ────────────────────────────────────────────── */
    .banner {
      background: linear-gradient(135deg, var(--brown-dk) 0%, var(--brown) 100%);
      padding: 2rem 2rem 1.75rem;
      position: relative;
      overflow: hidden;
    }

    .banner::before {
      content: "";
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
    }

    .banner-logo {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--brown-lt);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: .5rem;
    }

    .banner-title {
      font-family: 'Fraunces', serif;
      font-size: 1.7rem;
      color: #fff;
      line-height: 1.2;
      margin-bottom: .25rem;
    }

    .banner-sub {
      font-size: .82rem;
      color: rgba(255,255,255,.6);
    }

    /* ── Sub-tabs Entrar/Cadastrar ─────────────────────────── */
    .sub-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid rgba(196,168,130,.25);
    }

    .sub-tab {
      padding: .9rem;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      position: relative;
      transition: color .2s;
    }

    .sub-tab.active {
      color: var(--brown-dk);
      font-weight: 600;
    }

    .sub-tab.active::after {
      content: "";
      position: absolute;
      bottom: 0; left: 20%; right: 20%;
      height: 2px;
      background: var(--brown);
      border-radius: 2px 2px 0 0;
    }

    /* ── Body ──────────────────────────────────────────────── */
    .body {
      padding: 1.75rem 2rem 2rem;
    }

    /* ── Mensagem ──────────────────────────────────────────── */
    .auth-msg {
      font-size: .85rem;
      min-height: 1.2rem;
      margin-bottom: .75rem;
      padding: .5rem .75rem;
      border-radius: 8px;
      display: none;
    }

    .auth-msg.ok    { display: block; background: rgba(26,107,80,.1);  color: var(--ok); }
    .auth-msg.error { display: block; background: rgba(163,28,28,.09); color: var(--error); }

    /* ── Hint ──────────────────────────────────────────────── */
    .hint {
      font-size: .8rem;
      color: var(--muted);
      background: rgba(196,168,130,.15);
      border-radius: 10px;
      padding: .65rem .9rem;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    /* ── Grupos de campo ───────────────────────────────────── */
    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .4rem;
    }

    .field input {
      width: 100%;
      padding: .8rem 1rem;
      border: 1.5px solid rgba(196,168,130,.5);
      border-radius: 12px;
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .field input:focus {
      border-color: var(--brown);
      box-shadow: 0 0 0 3px rgba(124,92,62,.12);
    }

    .field input::placeholder { color: #c4b0a0; }

    /* ── Checkbox ──────────────────────────────────────────── */
    .check-line {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      cursor: pointer;
    }

    .check-line input[type=checkbox] {
      width: 16px; height: 16px;
      accent-color: var(--brown);
      cursor: pointer;
    }

    /* ── Botão primário ────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: .9rem;
      background: linear-gradient(135deg, var(--brown-dk), var(--brown));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .btn-primary:hover   { opacity: .92; transform: translateY(-1px); }
    .btn-primary:active  { transform: translateY(0); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    /* ── Botão secundário (visitante) ──────────────────────── */
    .btn-ghost {
      width: 100%;
      margin-top: .75rem;
      padding: .8rem;
      background: transparent;
      border: 1.5px solid rgba(196,168,130,.6);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      color: var(--muted);
      cursor: pointer;
      transition: background .2s, color .2s;
    }

    .btn-ghost:hover { background: rgba(196,168,130,.15); color: var(--brown-dk); }

    /* ── Link staff ────────────────────────────────────────── */
    .staff-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(196,168,130,.25);
      font-size: .8rem;
      color: var(--muted);
    }

    .staff-link a {
      color: var(--brown);
      font-weight: 600;
      text-decoration: none;
      transition: color .2s;
    }

    .staff-link a:hover { color: var(--brown-dk); text-decoration: underline; }

    /* ── Voltar ────────────────────────────────────────────── */
    .btn-back {
      display: inline-block;
      margin-top: .75rem;
      font-size: .82rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: .4rem 0;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-back:hover { color: var(--brown-dk); }

    /* ── Hidden ────────────────────────────────────────────── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="card">

  <!-- Banner -->
  <div class="banner">
    <div class="banner-logo">IMTSB</div>
    <div class="banner-title">Sistema de Filas</div>
    <div class="banner-sub">Instituto Médio Técnico São Benedito</div>
  </div>

  <!-- Sub-tabs -->
  <div class="sub-tabs">
    <button class="sub-tab active" data-subtab="entrar">Entrar</button>
    <button class="sub-tab"        data-subtab="cadastrar">Cadastrar</button>
  </div>

  <!-- Body -->
  <div class="body">

    <div id="authMsg" class="auth-msg"></div>

    <!-- ── ENTRAR ──────────────────────────────────────────── -->
    <form id="formEntrar">
      <p class="hint">Identifique-se com o email ou telefone que usou no registo.</p>

      <div class="field">
        <label>Email ou Telefone</label>
        <input type="text" id="clienteIdentif"
               placeholder="email@exemplo.com ou 9XXXXXXXX"
               required autocomplete="email" maxlength="100">
      </div>

      <label class="check-line">
        <input type="checkbox" id="confirmEntrar">
        Confirmo que os dados estão correctos.
      </label>

      <button type="submit" class="btn-primary">Entrar →</button>
      <button type="button" class="btn-ghost" id="btnGuest">Continuar sem conta</button>
      <button type="button" class="btn-back" onclick="voltarprincipal()">← Voltar à página principal</button>
    </form>

    <!-- ── CADASTRAR ────────────────────────────────────────── -->
    <form id="formCadastrar" class="hidden">
      <p class="hint">Crie a sua conta para acompanhar os seus atendimentos.</p>

      <div class="field">
        <label>Nome completo *</label>
        <input type="text" id="cNome" placeholder="O seu nome completo"
               required minlength="3" maxlength="80" autocomplete="name">
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="cEmail" placeholder="email@exemplo.com"
               autocomplete="email" maxlength="100">
      </div>

      <div class="field">
        <label>Telefone</label>
        <input type="tel" id="cTelefone" placeholder="9XXXXXXXX"
               autocomplete="tel" maxlength="20">
      </div>

      <label class="check-line">
        <input type="checkbox" id="cConfirm">
        Confirmo que os dados são correctos.
      </label>

      <button type="submit" class="btn-primary">Criar conta →</button>
      <button type="button" class="btn-back" onclick="voltarprincipal()">← Voltar</button>
    </form>

    <!-- Link discreto para staff -->
    <div class="staff-link">
      Trabalhador ou administrador?
      <a href="/login-staff.html">Acesso de staff →</a>
    </div>

  </div>
</div>

<script src="/static/js/api-config.js"></script>
<script src="/static/js/api-adapter.js"></script>
<script src="/static/js/api-client.js"></script>
<script src="/static/js/realtime-store.js"></script>
<script src="/static/js/logintcc.js"></script>
</body>
</html>
