<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrícula — IMTSB</title>
  <link rel="stylesheet" href="/static/css/service-form.css">
</head>
<body data-service="Matricula">
  <main class="page">
    <div class="top">
      <a class="back" href="/visitante.html">← Voltar</a>
      <strong>Secretaria Académica</strong>
    </div>
    <section class="card">
      <h1 id="serviceTitle">Matrícula</h1>
      <p class="hint">Preencha o formulário e emita a sua senha de atendimento.</p>
      <form id="serviceForm" class="form-grid">

        <!-- Campos dinâmicos (gerados pelo service-form.js) -->
        <div id="dynamicFields"></div>

        <!-- Email de notificação -->
        <div>
          <label for="notificationEmail">Email para notificações (opcional)</label>
          <input id="notificationEmail" type="email" placeholder="exemplo@email.com">
        </div>

        <!-- Lista de documentos necessários -->
        <div class="docs-box">
          <strong>📋 Documentos necessários:</strong>
          <ul id="requiredDocs"></ul>
        </div>

        <!-- Campo de anexo (gerado pelo service-form.js) -->
        <div id="attachmentsFields" class="attachments-grid"></div>

        <!-- Botão e feedback -->
        <div class="actions">
          <button class="btn btn-primary" type="submit">
            Enviar Formulário e Emitir Senha
          </button>
          <a class="btn" href="/visitante.html" style="background:#f3ece6;color:#401903;">
            Cancelar
          </a>
        </div>
        <div id="formMsg" class="msg"></div>

      </form>
    </section>
  </main>

  <script src="/static/js/api-config.js"></script>
  <script src="/static/js/realtime-store.js"></script>
  <script src="/static/js/service-form.js"></script>
</body>
</html>
