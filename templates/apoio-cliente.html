<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apoio ao Cliente — IMTSB</title>
  <link rel="stylesheet" href="/static/css/service-form.css">
</head>
<body data-service="Apoio ao Cliente">
  <main class="page">
    <div class="top">
      <a class="back" href="/index.html">← Voltar</a>
      <strong>Apoio ao Cliente</strong>
    </div>
    <section class="card">
      <h1 id="serviceTitle">Apoio ao Cliente</h1>
      <p class="hint">Preencha o formulário e emita a sua senha de atendimento.</p>
      <form id="serviceForm" class="form-grid">
        <div id="dynamicFields"></div>
        <div>
          <label for="notificationEmail">Email para notificações (opcional)</label>
          <input id="notificationEmail" type="email">
        </div>
        <div>
          <label for="attachments">Anexar ficheiro (opcional)</label>
          <input id="attachments" type="file" multiple>
        </div>
        <div class="docs-box">
          <strong>Documentos recomendados:</strong>
          <ul id="requiredDocs"></ul>
        </div>
        <div class="actions">
          <button class="btn btn-primary" type="submit">Emitir Senha</button>
          <a class="btn" href="/index.html" style="background:#f3ece6;color:#401903;">Cancelar</a>
        </div>
        <div id="formMsg" class="msg"></div>
      </form>
    </section>
  </main>
  <script src="/static/js/service-form.js"></script>
</body>
</html>
