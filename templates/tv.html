<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMTSB — Painel de Chamadas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brown:    #6b4226;
            --brown-dk: #3e2210;
            --brown-lt: #bf9776;
            --bg:       #0f0a06;
            --card:     rgba(255,255,255,0.05);
            --border:   rgba(255,255,255,0.08);
            --text:     #f5ede6;
            --muted:    rgba(245,237,230,0.5);
            --green:    #bf9776;
            --amber:    #f59e0b;
            --blue:     #8c6746;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ─────────────────────────────────────── */
        header {
            background: linear-gradient(135deg, var(--brown-dk), var(--brown));
            padding: 1.25rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--brown-lt);
        }

        .logo-area { display: flex; align-items: center; gap: 1rem; }

        .logo-badge {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.15);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem; font-weight: 900;
            color: #fff;
        }

        .logo-text h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem; font-weight: 700; color: #fff;
        }
        .logo-text p { font-size: .8rem; color: rgba(255,255,255,0.7); }

        .header-right { display: flex; align-items: center; gap: 2rem; }

        .live-badge {
            display: flex; align-items: center; gap: .5rem;
            background: rgba(191,151,118,0.18);
            border: 1px solid rgba(191,151,118,0.45);
            border-radius: 50px;
            padding: .4rem 1rem;
            font-size: .85rem; font-weight: 600; color: var(--green);
        }

        .live-dot {
            width: 8px; height: 8px;
            background: var(--green); border-radius: 50%;
            animation: blink 1.4s ease-in-out infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; } 50% { opacity: .3; }
        }

        #clock {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem; font-weight: 700;
            color: #fff; letter-spacing: .05em;
        }

        /* ── MAIN LAYOUT ─────────────────────────────────── */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 0;
        }

        /* ── PAINEL ESQUERDO — em atendimento ────────────── */
        .panel-left {
            background: rgba(107,66,38,0.12);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel-title {
            font-size: .75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: .1em;
            color: var(--muted);
            margin-bottom: .5rem;
        }

        .attending-card {
            background: linear-gradient(135deg, var(--brown), var(--brown-dk));
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            animation: slideIn .4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .attending-number {
            font-family: 'Poppins', sans-serif;
            font-size: 2.8rem; font-weight: 900;
            color: #fff; line-height: 1;
            min-width: 100px;
        }

        .attending-priority {
            font-family: 'Poppins', sans-serif;
            font-size: 2.2rem; font-weight: 900;
            color: var(--amber); line-height: 1;
            min-width: 100px;
        }

        .attending-info { flex: 1; }
        .attending-service {
            font-size: .9rem; font-weight: 600;
            color: rgba(255,255,255,0.9);
        }
        .attending-balcao {
            font-size: 1.3rem; font-weight: 700;
            color: var(--brown-lt); margin-top: .2rem;
        }

        .tipo-badge {
            font-size: .7rem; font-weight: 700;
            padding: .25rem .6rem; border-radius: 20px;
            text-transform: uppercase; letter-spacing: .05em;
        }
        .tipo-normal     { background: rgba(140,103,70,.24); color: #f1ddcb; }
        .tipo-prioritaria { background: rgba(245,158,11,.25); color: #fcd34d; }

        .empty-state {
            color: var(--muted);
            font-size: .9rem;
            text-align: center;
            padding: 2rem 0;
        }

        /* ── PAINEL DIREITO — aguardando ─────────────────── */
        .panel-right {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .total-badge {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .5rem 1rem;
            font-size: .85rem;
            color: var(--muted);
        }
        .total-badge strong {
            display: block;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
        }

        .queue-table {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: .6rem;
        }

        .queue-row {
            display: grid;
            grid-template-columns: 40px 100px 1fr auto;
            align-items: center;
            gap: 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: .9rem 1.25rem;
            transition: background .2s;
        }

        .queue-row:first-child {
            background: rgba(107,66,38,0.3);
            border-color: var(--brown-lt);
        }

        .q-pos {
            font-size: .8rem; font-weight: 700;
            color: var(--muted); text-align: center;
        }

        .q-num {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem; font-weight: 900;
            color: var(--text);
        }

        .queue-row:first-child .q-num { color: var(--brown-lt); font-size: 2rem; }

        .q-service { font-size: .85rem; color: var(--muted); }

        .q-time {
            font-size: .8rem; font-weight: 600;
            color: var(--muted); white-space: nowrap;
        }

        /* ── FOOTER ──────────────────────────────────────── */
        footer {
            background: rgba(255,255,255,0.03);
            border-top: 1px solid var(--border);
            padding: .75rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .78rem;
            color: var(--muted);
        }

        #lastUpdate { color: var(--muted); }

        /* ── LOADING ─────────────────────────────────────── */
        #loadingOverlay {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            transition: opacity .5s;
        }
        #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
        .loader-text {
            font-size: 1.2rem; color: var(--muted);
            animation: pulse2 1.5s ease-in-out infinite;
        }
        @keyframes pulse2 { 0%,100%{opacity:1}50%{opacity:.4} }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <p class="loader-text">A carregar fila…</p>
</div>

<!-- HEADER -->
<header>
    <div class="logo-area">
        <div class="logo-badge">SB</div>
        <div class="logo-text">
            <h1>IMTSB</h1>
            <p>Instituto Médio Técnico São Benedito</p>
        </div>
    </div>
    <div class="header-right">
        <div class="live-badge">
            <div class="live-dot"></div>
            AO VIVO
        </div>
        <div id="clock">00:00:00</div>
    </div>
</header>

<!-- CONTEÚDO PRINCIPAL -->
<main>
    <!-- Painel esquerdo: em atendimento -->
    <div class="panel-left">
        <p class="panel-title">Em Atendimento Agora</p>
        <div id="attendingList">
            <p class="empty-state">Nenhum atendimento em curso</p>
        </div>
    </div>

    <!-- Painel direito: aguardando -->
    <div class="panel-right">
        <div class="panel-header-row">
            <div>
                <p class="panel-title">Próximas Senhas</p>
                <p id="tempoMedio" style="font-size:.85rem;color:var(--muted);margin-top:.25rem;">
                    Tempo estimado: –
                </p>
            </div>
            <div class="total-badge">
                <strong id="totalWaiting">0</strong>
                na fila
            </div>
        </div>
        <div class="queue-table" id="queueTable">
            <p class="empty-state">Nenhuma senha aguardando</p>
        </div>
    </div>
</main>

<!-- FOOTER -->
<footer>
    <span>Sistema de Gestão de Filas · IMTSB 2026</span>
    <span id="lastUpdate">Última actualização: –</span>
</footer>

<script>
(function () {
    "use strict";

    const INTERVALO_MS = 8000; // actualizar a cada 8 segundos

    // ── Relógio ──────────────────────────────────────────────
    function actualizarRelogio() {
        const agora = new Date();
        document.getElementById('clock').textContent =
            agora.toLocaleTimeString('pt-PT');
    }
    actualizarRelogio();
    setInterval(actualizarRelogio, 1000);

    // ── Carregar dados ────────────────────────────────────────
    async function carregar() {
        try {
            const resp = await fetch('/api/dashboard/public/tv');
            if (!resp.ok) return;

            const data = await resp.json();

            renderAtendendo(data.em_atendimento || []);
            renderFila(data.aguardando || [], data.total_aguardando || 0);

            // Tempo médio global
            const tmEl = document.getElementById('tempoMedio');
            if (tmEl) {
                tmEl.textContent = data.tempo_medio_global > 0
                    ? `Espera estimada: ~${data.tempo_medio_global} min por atendimento`
                    : 'Espera estimada: –';
            }

            // Última actualização
            const upEl = document.getElementById('lastUpdate');
            if (upEl) {
                upEl.textContent = `Última actualização: ${
                    new Date().toLocaleTimeString('pt-PT')
                }`;
            }

            // Esconder loading
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.add('hidden');

        } catch (e) {
            console.error('Erro ao carregar dados:', e);
        }
    }

    function renderAtendendo(lista) {
        const el = document.getElementById('attendingList');
        if (!el) return;

        if (lista.length === 0) {
            el.innerHTML = '<p class="empty-state">Nenhum atendimento em curso</p>';
            return;
        }

        el.innerHTML = lista.map(item => {
            const isPriority = item.tipo === 'prioritaria';
            const numClass   = isPriority ? 'attending-priority' : 'attending-number';
            const badgeClass = isPriority ? 'tipo-prioritaria'   : 'tipo-normal';
            const badgeText  = isPriority ? '★ Prioritária'       : 'Normal';

            return `
              <div class="attending-card">
                <div class="${numClass}">${item.numero}</div>
                <div class="attending-info">
                  <div class="attending-service">${item.servico}</div>
                  <div class="attending-balcao">Balcão ${item.balcao}</div>
                  <span class="tipo-badge ${badgeClass}">${badgeText}</span>
                </div>
              </div>
            `;
        }).join('');
    }

    function renderFila(lista, total) {
        const tabelaEl  = document.getElementById('queueTable');
        const totalEl   = document.getElementById('totalWaiting');

        if (totalEl) totalEl.textContent = total;

        if (!tabelaEl) return;

        if (lista.length === 0) {
            tabelaEl.innerHTML = '<p class="empty-state">Nenhuma senha aguardando</p>';
            return;
        }

        tabelaEl.innerHTML = lista.map(item => {
            const tempoTexto = item.tempo_espera_estimado > 0
                ? `~${item.tempo_espera_estimado}min`
                : '–';

            return `
              <div class="queue-row">
                <div class="q-pos">${item.posicao}º</div>
                <div class="q-num">${item.numero}</div>
                <div class="q-service">${item.servico}</div>
                <div class="q-time">${tempoTexto}</div>
              </div>
            `;
        }).join('');
    }

    // Carregar imediatamente e depois a cada 8s
    carregar();
    setInterval(carregar, INTERVALO_MS);
})();
</script>
</body>
</html>
