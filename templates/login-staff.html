<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Staff — IMTSB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dk:     #1a0e06;
      --brown:  #7c5c3e;
      --lt:     #c4a882;
      --beige:  #f0e8dc;
      --text:   #1a0e06;
      --muted:  #7a6050;
      --ok:     #1a6b50;
      --error:  #a31c1c;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: var(--dk);
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,92,62,.25) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 85% 80%, rgba(196,168,130,.1) 0%, transparent 60%);
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(196,168,130,.2);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
    }

    .banner {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid rgba(196,168,130,.15);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .8rem;
      color: rgba(196,168,130,.7);
      text-decoration: none;
      margin-bottom: 1.25rem;
      transition: color .2s;
    }
    .back-link:hover { color: var(--lt); }

    .banner-logo  { font-family:'Fraunces',serif; font-size:.9rem; color: var(--lt); letter-spacing:.1em; text-transform:uppercase; margin-bottom:.4rem; }
    .banner-title { font-family:'Fraunces',serif; font-size:1.5rem; color:#fff; margin-bottom:.2rem; }
    .banner-sub   { font-size:.8rem; color: rgba(255,255,255,.45); }

    .body { padding: 1.75rem 2rem 2rem; }

    .auth-msg {
      font-size: .85rem;
      min-height: 1.2rem;
      margin-bottom: .85rem;
      padding: .5rem .75rem;
      border-radius: 8px;
      display: none;
    }
    .auth-msg.ok    { display:block; background:rgba(26,107,80,.2);  color:#4ade80; }
    .auth-msg.error { display:block; background:rgba(163,28,28,.25); color:#fca5a5; }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      color: rgba(196,168,130,.8);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: .4rem;
    }

    .field input, .field select {
      width: 100%;
      padding: .85rem 1rem;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(196,168,130,.25);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--lt);
      box-shadow: 0 0 0 3px rgba(196,168,130,.12);
    }
    .field input::placeholder { color: rgba(255,255,255,.25); }
    .field select option { background: #2a1a0a; color: #fff; }

    .check-line {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .82rem;
      color: rgba(255,255,255,.45);
      margin-bottom: 1.25rem;
      cursor: pointer;
    }
    .check-line input[type=checkbox] { width:16px; height:16px; accent-color:var(--lt); cursor:pointer; }

    .btn-primary {
      width: 100%;
      padding: .9rem;
      background: linear-gradient(135deg, var(--brown), var(--lt));
      color: var(--dk);
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .btn-primary:hover    { opacity:.9; transform:translateY(-1px); }
    .btn-primary:disabled { opacity:.45; cursor:not-allowed; transform:none; }

    .client-link {
      display: block;
      text-align: center;
      margin-top: 1.4rem;
      font-size: .8rem;
      color: rgba(255,255,255,.3);
    }
    .client-link a { color: rgba(196,168,130,.7); text-decoration: none; }
    .client-link a:hover { color: var(--lt); }
  </style>
</head>
<body>

<div class="card">
  <div class="banner">
    <a class="back-link" href="/logintcc.html">← Voltar ao acesso de clientes</a>
    <div class="banner-logo">IMTSB · Staff</div>
    <div class="banner-title">Área Restrita</div>
    <div class="banner-sub">Trabalhadores e administradores do instituto</div>
  </div>

  <div class="body">
    <div id="authMsg" class="auth-msg"></div>

    <form id="formStaff" autocomplete="on">
      <div class="field">
        <label>Perfil</label>
        <select id="loginTipo">
          <option value="trabalhador">Trabalhador</option>
          <option value="admin">Administrador</option>
        </select>
      </div>

      <div class="field">
        <label>Email institucional</label>
        <input type="email" id="iemail" placeholder="nome@imtsb.ao"
               required autocomplete="email" maxlength="60">
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" id="isenha" placeholder="••••••••"
               required minlength="6" maxlength="32" autocomplete="current-password">
      </div>

      <label class="check-line">
        <input type="checkbox" id="loginConfirmDados">
        Confirmo os dados de acesso.
      </label>

      <button type="submit" class="btn-primary">Entrar no sistema →</button>
    </form>

    <div class="client-link">
      Não é staff? <a href="/logintcc.html">Acesso de cliente</a>
    </div>
  </div>
</div>

<script src="/static/js/api-config.js"></script>
<script src="/static/js/api-adapter.js"></script>
<script src="/static/js/api-client.js"></script>
<script src="/static/js/realtime-store.js"></script>
<script>
// Login staff inline — simples e directo
(function () {
  var msg  = document.getElementById("authMsg");
  var form = document.getElementById("formStaff");

  function show(t, k) {
    msg.textContent = t || ""; msg.className = "auth-msg"; if (k) msg.classList.add(k);
  }

  form && form.addEventListener("submit", async function (e) {
    e.preventDefault();
    var chk = document.getElementById("loginConfirmDados");
    if (chk && !chk.checked) { show("Confirme os dados.", "error"); return; }
    var email = (document.getElementById("iemail").value || "").trim();
    var senha = (document.getElementById("isenha").value || "");
    var tipo  = (document.getElementById("loginTipo").value || "").toLowerCase();
    if (!email || !senha) { show("Preencha email e senha.", "error"); return; }
    var btn = form.querySelector("[type=submit]");
    btn.disabled = true; btn.textContent = "A autenticar...";
    show("", "");
    try {
      var resp = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, senha: senha })
      });
      var data = await resp.json().catch(function () { return {}; });
      if (!resp.ok) { show(data.erro || "Credenciais incorrectas.", "error"); btn.disabled = false; btn.textContent = "Entrar no sistema →"; return; }
      var at   = data.atendente || {};
      var role = at.tipo === "admin" ? "admin" : "trabalhador";
      if (tipo === "admin" && at.tipo !== "admin") { show("Esta conta não é de administrador.", "error"); btn.disabled = false; btn.textContent = "Entrar no sistema →"; return; }
      var user = { id: at.id, name: at.nome || email, email: at.email || email, role: role, token: data.access_token || "", balcao: parseInt(at.balcao) || null, numero_balcao: parseInt(at.balcao) || null, servico_id: at.servico_id || null };
      localStorage.setItem("imtsb_user", JSON.stringify(user));
      localStorage.setItem("imtsb_access_token", user.token);
      show("Bem-vindo, " + user.name + "!", "ok");
      setTimeout(function () { window.location.href = role === "admin" ? "/dashadm.html" : "/dashtrabalho.html"; }, 350);
    } catch (err) {
      show("Erro de ligação ao servidor.", "error");
      btn.disabled = false; btn.textContent = "Entrar no sistema →";
    }
  });
})();
</script>
</body>
</html>
